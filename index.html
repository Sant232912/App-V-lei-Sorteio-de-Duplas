<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelho Bichado Pro</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #1A1A1A;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a10 100%);
            background-attachment: fixed;
            color: white;
            padding: 15px;
            margin: 0;
        }

        /* Centralização para PC parecer Celular */
        @media (min-width: 600px) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            .main-container {
                width: 375px;
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.1);
            }
        }

        .main-container {
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 20px;
            max-width: 450px;
            margin: 0 auto;
            background: #050505;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.4rem;
            margin: 0 0 10px 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: black;
            border-color: var(--primary);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1rem;
        }

        .genero-escolha {
            display: flex;
            gap: 8px;
        }

        .btn-gen {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .lista-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .btn-select-all {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }

        .lista-jogadores {
            height: 220px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 15px;
            padding: 5px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .card-jogador {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #252525;
        }

        .info-player {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            opacity: 0.6;
        }

        .btn-acao {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-limpar {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            font-size: 0.9rem;
        }

        .resultado-box {
            margin-top: 15px;
            background: #111;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--primary);
            max-height: 400px;
            overflow-y: auto;
        }

        .item-resultado {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #222;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .grupo-titulo {
            color: var(--primary);
            text-align: center;
            margin-top: 15px;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 5px;
            font-weight: bold;
        }

        .aviso {
            font-size: 0.85rem;
            color: var(--primary);
            text-align: center;
            padding: 10px;
            font-style: italic;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #222;
            color: white;
            border: 1px solid #444;
            margin-bottom: 15px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h1>🏐 JOELHO BICHADO PRO</h1>

        <div class="tabs">
            <button class="tab-btn active" id="tabDayUse" onclick="switchTab('dayuse')">DAY USE</button>
            <button class="tab-btn" id="tabTorneio" onclick="switchTab('torneio')">TORNEIO</button>
        </div>

        <div class="input-group">
            <input type="text" id="novoNome" placeholder="Nome do novo atleta...">
            <div class="genero-escolha">
                <button class="btn-gen" onclick="adicionarComGenero('M')">MASC</button>
                <button class="btn-gen" onclick="adicionarComGenero('F')">FEM</button>
            </div>
        </div>

        <select id="modo" onchange="render()">
            <option value="misto">Misto (H+M)</option>
            <option value="masc">Masculino</option>
            <option value="fem">Feminino</option>
        </select>

        <div class="lista-header">
            <span style="font-size: 0.85rem; color: #888;">Atletas:</span>
            <button class="btn-select-all" onclick="selecionarTodos()">SELECIONAR TODOS</button>
        </div>

        <div class="lista-jogadores" id="lista"></div>

        <div id="resultado" class="resultado-box" style="display:none"></div>

        <button class="btn-acao" id="btnPrincipal" onclick="sortearDayUse()">GERAR PRÓXIMA RODADA 🎲</button>
        <button class="btn-acao btn-limpar" onclick="reiniciar()">REINICIAR TUDO 🔄</button>
    </div>

    <script>
        const listaPadrao = [
            { n: "Celin Vôlei", s: "M" }, { n: "Geminiana", s: "F" }, { n: "Lorraine", s: "F" },
            { n: "Emerson", s: "M" }, { n: "Lúcio", s: "M" }, { n: "Wendel", s: "M" },
            { n: "Ricardo", s: "M" }, { n: "Patrícia", s: "F" }, { n: "Bruno", s: "M" },
            { n: "Cássia", s: "F" }, { n: "Diego", s: "M" }, { n: "Fernanda", s: "F" },
            { n: "Gustavo", s: "M" }, { n: "Helena", s: "F" }, { n: "Igor", s: "M" },
            { n: "Juliana", s: "F" }, { n: "Kevin", s: "M" }, { n: "Larissa", s: "F" },
            { n: "Murilo", s: "M" }, { n: "Natália", s: "F" }, { n: "Otávio", s: "M" },
            { n: "Paula", s: "F" }, { n: "Quirino", s: "M" }, { n: "Renata", s: "F" },
            { n: "Samuel", s: "M" }, { n: "Talita", s: "F" }, { n: "Uriel", s: "M" },
            { n: "Vitor", s: "M" }, { n: "Wagner", s: "M" }, { n: "Xande", s: "M" }
        ];

        let atletas = JSON.parse(localStorage.getItem('listaAtletas')) || listaPadrao;
        let lastResult = localStorage.getItem('lastResult') || "";

        function salvar() {
            localStorage.setItem('listaAtletas', JSON.stringify(atletas));
        }

        function selecionarTodos() {
            const checks = document.querySelectorAll('.atleta-check');
            const todosMarcados = Array.from(checks).every(c => c.checked);
            checks.forEach(c => c.checked = !todosMarcados);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'dayuse') document.getElementById('tabDayUse').classList.add('active');
            else document.getElementById('tabTorneio').classList.add('active');

            const btn = document.getElementById('btnPrincipal');
            btn.innerText = tab === 'dayuse' ? "GERAR PRÓXIMA RODADA 🎲" : "SORTEAR DUPLAS E GRUPOS 🏆";
            btn.onclick = tab === 'dayuse' ? sortearDayUse : gerarTorneioCompleto;
        }

        function render() {
            const container = document.getElementById('lista');
            const modo = document.getElementById('modo').value;
            container.innerHTML = "";
            atletas.forEach((atleta, i) => {
                const mostrar = (modo === "misto") || (modo === "masc" && atleta.s === "M") || (modo === "fem" && atleta.s === "F");
                if (mostrar) {
                    container.innerHTML += `
                        <div class="card-jogador">
                            <div class="info-player">
                                <input type="checkbox" class="atleta-check" data-index="${i}">
                                <span>${atleta.n} <small style="color:#555">(${atleta.s})</small></span>
                            </div>
                            <div class="acoes-player">
                                <button class="icon-btn" onclick="editarNome(${i})">✏️</button>
                                <button class="icon-btn" style="color:#ff4444" onclick="excluirAtleta(${i})">🗑️</button>
                            </div>
                        </div>`;
                }
            });

            // Recupera o último sorteio se existir
            if (lastResult) {
                const resDiv = document.getElementById('resultado');
                resDiv.innerHTML = lastResult;
                resDiv.style.display = "block";
            }
        }

        function mostrarResultado(html) {
            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = html;
            resDiv.style.display = "block";
            localStorage.setItem('lastResult', html); // SALVA O HISTÓRICO
            lastResult = html;
        }

        function formarDuplas(lista) {
            let tempLista = [...lista].sort(() => Math.random() - 0.5);
            let duplas = [], sobra = [];
            const modo = document.getElementById('modo').value;

            if (modo === "misto") {
                let h = tempLista.filter(a => a.s === 'M'), m = tempLista.filter(a => a.s === 'F');
                while (h.length > 0 && m.length > 0) duplas.push(`🤝 ${h.pop().n} + ${m.pop().n}`);
                sobra = [...h, ...m];
            } else {
                for (let i = 0; i < tempLista.length; i += 2) {
                    if (tempLista[i + 1]) duplas.push(`🤝 ${tempLista[i].n} + ${tempLista[i + 1].n}`);
                    else sobra.push(tempLista[i]);
                }
            }
            return { duplas, sobra };
        }

        function sortearDayUse() {
            const selecionados = getSelecionados();
            if (selecionados.length < 2) return alert("Selecione os atletas!");
            const res = formarDuplas(selecionados);
            let html = "<h3 style='text-align:center; margin:0; color:var(--primary)'>DUPLAS DAY USE</h3>";
            res.duplas.forEach(d => html += `<div class="item-resultado">${d}</div>`);
            if (res.sobra.length > 0) html += `<div class="aviso">⚠️ Aguardando: ${res.sobra.map(s => s.n).join(', ')}</div>`;
            mostrarResultado(html);
        }

        function gerarTorneioCompleto() {
            const selecionados = getSelecionados();
            if (selecionados.length < 4) return alert("Mínimo de 4 atletas!");
            const res = formarDuplas(selecionados);
            if (res.duplas.length < 2) return alert("Não há duplas suficientes!");

            let html = "<h3 style='text-align:center; margin:0; color:var(--primary)'>SORTEIO DO TORNEIO</h3>";
            const duplasSorteadas = res.duplas.sort(() => Math.random() - 0.5);
            const numGrupos = Math.ceil(duplasSorteadas.length / 2);
            for (let i = 0; i < numGrupos; i++) {
                const grupo = duplasSorteadas.slice(i * 2, (i + 1) * 2);
                html += `<div class="grupo-titulo">GRUPO ${String.fromCharCode(65 + i)}</div>`;
                grupo.forEach(d => html += `<div class="item-resultado">${d}</div>`);
            }
            if (res.sobra.length > 0) html += `<div class="aviso">⚠️ Sem dupla: ${res.sobra.map(s => s.n).join(', ')}</div>`;
            mostrarResultado(html);
        }

        function adicionarComGenero(sexo) {
            const campo = document.getElementById('novoNome');
            if (!campo.value) return alert("Digite o nome!");
            atletas.unshift({ n: campo.value, s: sexo });
            campo.value = ""; salvar(); render();
        }

        function editarNome(i) {
            const novo = prompt("Editar nome:", atletas[i].n);
            if (novo) { atletas[i].n = novo; salvar(); render(); }
        }

        function excluirAtleta(i) {
            if (confirm(`Remover ${atletas[i].n}?`)) { atletas.splice(i, 1); salvar(); render(); }
        }

        function getSelecionados() {
            const checks = document.querySelectorAll('.atleta-check:checked');
            return Array.from(checks).map(c => atletas[c.getAttribute('data-index')]);
        }

        function reiniciar() {
            if (confirm("Deseja apagar o sorteio e as presenças?")) {
                document.querySelectorAll('.atleta-check').forEach(c => c.checked = false);
                document.getElementById('resultado').style.display = "none";
                localStorage.removeItem('lastResult');
                lastResult = "";
            }
        }
        render();
    </script>
</body>

</html>
