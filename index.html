<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelho Bichado Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            padding: 20px;
            margin: 0;
        }

        h1 {
            text-align: center;
            color: #FFD700;
        }

        /* LISTA VERTICAL (O jeito que você gosta) */
        .lista-jogadores {
            display: flex;
            flex-direction: column;
            /* Um embaixo do outro */
            gap: 12px;
            margin-top: 20px;
        }

        .card-jogador {
            background-color: #1E1E1E;
            padding: 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #333;
        }

        .card-jogador input {
            transform: scale(1.8);
            /* Checkbox grande pra facilitar no cel */
        }

        .btn-acao {
            width: 100%;
            background-color: #FFD700;
            color: black;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
        }

        .resultado {
            margin-top: 30px;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>🏐 JOELHO BICHADO PRO</h1>

    <div style="margin-bottom: 20px;">
        <label>Modo de Jogo:</label>
        <select id="modo" style="width: 100%; padding: 10px; margin-top: 5px;">
            <option value="masc">Masculino / Geral</option>
            <option value="misto">Misto (H + M)</option>
        </select>
    </div>

    <div class="lista-jogadores" id="lista">
    </div>

    <button class="btn-acao" onclick="sortear()">SORTEAR DUPLAS 🎲</button>

    <div id="resultado" class="resultado" style="display:none;"></div>

    <script>
        // LISTA DOS 30 NOMES (Pode editar aqui embaixo)
        const nomes = [
            { n: "Celin Vôlei", s: "M" }, { n: "Geminiana", s: "F" }, { n: "Lorraine", s: "F" },
            { n: "Emerson", s: "M" }, { n: "Lúcio", s: "M" }, { n: "Wendel", s: "M" },
            { n: "Ricardo", s: "M" }, { n: "Patrícia", s: "F" }, { n: "Bruno", s: "M" },
            { n: "Cássia", s: "F" }, { n: "Diego", s: "M" }, { n: "Fernanda", s: "F" },
            { n: "Gustavo", s: "M" }, { n: "Helena", s: "F" }, { n: "Igor", s: "M" },
            { n: "Juliana", s: "F" }, { n: "Kevin", s: "M" }, { n: "Larissa", s: "F" },
            { n: "Murilo", s: "M" }, { n: "Natália", s: "F" }, { n: "Otávio", s: "M" },
            { n: "Paula", s: "F" }, { n: "Quirino", s: "M" }, { n: "Renata", s: "F" },
            { n: "Samuel", s: "M" }, { n: "Talita", s: "F" }, { n: "Uriel", s: "M" },
            { n: "Vitor", s: "M" }, { n: "Wagner", s: "M" }, { n: "Xande", s: "M" }
        ];

        function carregar() {
            const div = document.getElementById('lista');
            nomes.forEach((j, i) => {
                div.innerHTML += `
                    <label class="card-jogador">
                        <span>${j.n} (${j.s})</span>
                        <input type="checkbox" class="check-atleta" value="${i}">
                    </label>
                `;
            });
        }

        function sortear() {
            const checks = document.querySelectorAll('.check-atleta:checked');
            let selecionados = Array.from(checks).map(c => nomes[c.value]);
            const modo = document.getElementById('modo').value;
            const resDiv = document.getElementById('resultado');

            if (selecionados.length < 2) return alert("Selecione pelo menos 2!");

            resDiv.style.display = "block";
            resDiv.innerHTML = "<h3>Duplas do Dia:</h3>";

            selecionados.sort(() => Math.random() - 0.5);

            if (modo === "misto") {
                let h = selecionados.filter(j => j.s === "M");
                let m = selecionados.filter(j => j.s === "F");
                let qtd = Math.min(h.length, m.length);
                for (let i = 0; i < qtd; i++) {
                    resDiv.innerHTML += `<p>✅ ${h[i].n} + ${m[i].n}</p>`;
                }
            } else {
                for (let i = 0; i < selecionados.length; i += 2) {
                    if (selecionados[i + 1]) {
                        resDiv.innerHTML += `<p>✅ ${selecionados[i].n} + ${selecionados[i + 1].n}</p>`;
                    } else {
                        resDiv.innerHTML += `<p>⚠️ Sobrou: ${selecionados[i].n}</p>`;
                    }
                }
            }
        }
        carregar();
    </script>
</body>

</html>
