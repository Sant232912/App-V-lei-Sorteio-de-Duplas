<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelho Bichado Pro</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #121212;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            color: white;
            padding: 20px;
            margin: 0;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* Container Principal com a borda amarela que você gosta */
        .main-container {
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h2 {
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 12px;
            color: white;
        }

        .btn-add {
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 0 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .lista-jogadores {
            height: 250px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .card-jogador {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        .card-jogador:last-child {
            border: none;
        }

        .btn-acao {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #b8860b;
        }

        .btn-acao:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .btn-limpar {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            box-shadow: none;
        }

        .resultado-box {
            margin-top: 15px;
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--primary);
        }

        .dupla {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            accent-color: var(--primary);
        }
    </style>
</head>

<body>
    <h1>🏐 JOELHO BICHADO PRO</h1>
    <div class="main-container">
        <h2>Gestão de Atletas</h2>
        <div class="input-group">
            <input type="text" id="novoNome" placeholder="Nome do Jogador">
            <button class="btn-add" onclick="adicionarNovo()">ADICIONAR</button>
        </div>

        <div class="lista-jogadores" id="lista"></div>

        <div class="resultado-box" id="resultado" style="display:none"></div>

        <button class="btn-acao" onclick="sortear()">SORTEAR CONFRONTOS 🎲</button>
        <button class="btn-acao btn-limpar" onclick="reiniciar()">LIMPAR BANCO DE DADOS</button>
    </div>

    <script>
        let atletas = [
            { n: "Celin Vôlei", s: "M" }, { n: "Geminiana", s: "F" }, { n: "Lorraine", s: "F" },
            { n: "Emerson", s: "M" }, { n: "Lúcio", s: "M" }, { n: "Wendel", s: "M" },
            { n: "Ricardo", s: "M" }, { n: "Patrícia", s: "F" }, { n: "Bruno", s: "M" },
            { n: "Cássia", s: "F" }, { n: "Diego", s: "M" }, { n: "Fernanda", s: "F" }
        ]; // Adicione os outros nomes aqui seguindo o padrão

        function render() {
            const container = document.getElementById('lista');
            container.innerHTML = "";
            atletas.forEach((atleta, i) => {
                container.innerHTML += `<div class="card-jogador"><span>${atleta.n}</span><input type="checkbox" class="atleta-check" value="${i}"></div>`;
            });
        }

        function adicionarNovo() {
            const nome = document.getElementById('novoNome').value;
            if (!nome) return;
            atletas.unshift({ n: nome, s: "M" });
            document.getElementById('novoNome').value = "";
            render();
        }

        function sortear() {
            const selecionados = Array.from(document.querySelectorAll('.atleta-check:checked')).map(c => atletas[c.value]);
            const resDiv = document.getElementById('resultado');
            if (selecionados.length < 2) return alert("Selecione os atletas!");
            resDiv.style.display = "block";
            resDiv.innerHTML = "<h2>Rodada</h2>";
            selecionados.sort(() => Math.random() - 0.5);
            for (let i = 0; i < selecionados.length; i += 2) {
                if (selecionados[i + 1]) resDiv.innerHTML += `<div class="dupla">${selecionados[i].n} & ${selecionados[i + 1].n}</div>`;
            }
        }

        function reiniciar() {
            document.querySelectorAll('.atleta-check').forEach(c => c.checked = false);
            document.getElementById('resultado').style.display = "none";
        }
        render();
    </script>
</body>

</html>
