<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelho Bichado Pro</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #1A1A1A;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            padding: 15px;
            margin: 0;
        }

        .main-container {
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 20px;
            max-width: 450px;
            margin: 0 auto;
            background: #050505;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* Sistema de Abas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: #888;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: black;
            border-color: var(--primary);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1rem;
        }

        .genero-escolha {
            display: flex;
            gap: 8px;
        }

        .btn-gen {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .lista-jogadores {
            height: 250px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 15px;
            padding: 5px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .card-jogador {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #252525;
        }

        .info-player {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .acoes-player {
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            opacity: 0.6;
        }

        .btn-acao {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-limpar {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            font-size: 0.9rem;
        }

        .resultado-box {
            margin-top: 15px;
            background: #111;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--primary);
        }

        .item-resultado {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #222;
            font-weight: 500;
        }

        .grupo-titulo {
            color: var(--primary);
            text-align: center;
            margin-top: 15px;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 5px;
        }

        .aviso {
            font-size: 0.85rem;
            color: var(--primary);
            text-align: center;
            padding: 10px;
            font-style: italic;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #222;
            color: white;
            border: 1px solid #444;
            margin-bottom: 15px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h1>🏐 JOELHO BICHADO PRO</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dayuse')">DAY USE</button>
            <button class="tab-btn" onclick="switchTab('torneio')">TORNEIO</button>
        </div>

        <div class="input-group">
            <input type="text" id="novoNome" placeholder="Nome do novo atleta...">
            <div class="genero-escolha">
                <button class="btn-gen" onclick="adicionarComGenero('M')">MASC (H)</button>
                <button class="btn-gen" onclick="adicionarComGenero('F')">FEM (M)</button>
            </div>
        </div>

        <label style="font-size: 0.8rem; color: #888; margin-left: 5px;">Tipo de Jogo / Filtro:</label>
        <select id="modo" onchange="render()">
            <option value="misto">Misto (Todos)</option>
            <option value="masc">Masculino</option>
            <option value="fem">Feminino</option>
        </select>

        <div class="lista-jogadores" id="lista"></div>

        <div id="resultado" class="resultado-box" style="display:none"></div>

        <div id="btn-container">
            <button class="btn-acao" id="btnPrincipal" onclick="sortearDayUse()">GERAR PRÓXIMA RODADA 🎲</button>
        </div>
        <button class="btn-acao btn-limpar" onclick="reiniciar()">REINICIAR TUDO 🔄</button>
    </div>

    <script>
        const listaPadrao = [
            { n: "Celin Vôlei", s: "M" }, { n: "Geminiana", s: "F" }, { n: "Lorraine", s: "F" },
            { n: "Emerson", s: "M" }, { n: "Lúcio", s: "M" }, { n: "Wendel", s: "M" },
            { n: "Ricardo", s: "M" }, { n: "Patrícia", s: "F" }, { n: "Bruno", s: "M" },
            { n: "Cássia", s: "F" }, { n: "Diego", s: "M" }, { n: "Fernanda", s: "F" },
            { n: "Gustavo", s: "M" }, { n: "Helena", s: "F" }, { n: "Igor", s: "M" },
            { n: "Juliana", s: "F" }, { n: "Kevin", s: "M" }, { n: "Larissa", s: "F" },
            { n: "Murilo", s: "M" }, { n: "Natália", s: "F" }, { n: "Otávio", s: "M" },
            { n: "Paula", s: "F" }, { n: "Quirino", s: "M" }, { n: "Renata", s: "F" },
            { n: "Samuel", s: "M" }, { n: "Talita", s: "F" }, { n: "Uriel", s: "M" },
            { n: "Vitor", s: "M" }, { n: "Wagner", s: "M" }, { n: "Xande", s: "M" }
        ];

        let atletas = JSON.parse(localStorage.getItem('listaAtletas')) || listaPadrao;
        let currentTab = 'dayuse';

        function salvar() { localStorage.setItem('listaAtletas', JSON.stringify(atletas)); }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const btn = document.getElementById('btnPrincipal');
            if (tab === 'dayuse') {
                btn.innerText = "GERAR PRÓXIMA RODADA 🎲";
                btn.onclick = sortearDayUse;
            } else {
                btn.innerText = "CRIAR FASE DE GRUPOS 🏆";
                btn.onclick = gerarTorneio;
            }
            document.getElementById('resultado').style.display = 'none';
        }

        function render() {
            const container = document.getElementById('lista');
            const modo = document.getElementById('modo').value;
            container.innerHTML = "";
            atletas.forEach((atleta, i) => {
                const mostrar = (modo === "misto") || (modo === "masc" && atleta.s === "M") || (modo === "fem" && atleta.s === "F");
                if (mostrar) {
                    container.innerHTML += `
                        <div class="card-jogador">
                            <div class="info-player">
                                <input type="checkbox" class="atleta-check" data-index="${i}">
                                <span>${atleta.n} <small style="color:#555">(${atleta.s})</small></span>
                            </div>
                            <div class="acoes-player">
                                <button class="icon-btn" onclick="editarNome(${i})">✏️</button>
                                <button class="icon-btn" style="color:#ff4444" onclick="excluirAtleta(${i})">🗑️</button>
                            </div>
                        </div>`;
                }
            });
        }

        function adicionarComGenero(sexo) {
            const campo = document.getElementById('novoNome');
            if (!campo.value) return alert("Digite o nome!");
            atletas.unshift({ n: campo.value, s: sexo });
            campo.value = ""; salvar(); render();
        }

        function editarNome(i) {
            const novo = prompt("Editar nome:", atletas[i].n);
            if (novo) { atletas[i].n = novo; salvar(); render(); }
        }

        function excluirAtleta(i) {
            if (confirm(`Remover ${atletas[i].n}?`)) { atletas.splice(i, 1); salvar(); render(); }
        }

        function sortearDayUse() {
            const selecionados = getSelecionados();
            if (selecionados.length < 2) return alert("Selecione os atletas!");
            const resDiv = document.getElementById('resultado');
            resDiv.style.display = "block";
            resDiv.innerHTML = "<h3 style='text-align:center; margin:0; color:var(--primary)'>DUPLAS DAY USE</h3>";

            selecionados.sort(() => Math.random() - 0.5);
            const modo = document.getElementById('modo').value;

            if (modo === "misto") {
                let h = selecionados.filter(a => a.s === 'M');
                let m = selecionados.filter(a => a.s === 'F');
                while (h.length > 0 && m.length > 0) resDiv.innerHTML += `<div class="item-resultado">✅ ${h.pop().n} + ${m.pop().n}</div>`;
                let sobra = [...h, ...m];
                if (sobra.length > 0) resDiv.innerHTML += `<div class="aviso">⚠️ Aguardando: ${sobra.map(s => s.n).join(', ')}</div>`;
            } else {
                for (let i = 0; i < selecionados.length; i += 2) {
                    if (selecionados[i + 1]) resDiv.innerHTML += `<div class="item-resultado">✅ ${selecionados[i].n} + ${selecionados[i + 1].n}</div>`;
                    else resDiv.innerHTML += `<div class="aviso">⚠️ Ímpar: ${selecionados[i].n} espera.</div>`;
                }
            }
        }

        function gerarTorneio() {
            const selecionados = getSelecionados();
            if (selecionados.length < 4) return alert("Mínimo de 4 atletas para torneio!");
            const resDiv = document.getElementById('resultado');
            resDiv.style.display = "block";
            resDiv.innerHTML = "<h3 style='text-align:center; margin:0; color:var(--primary)'>GRUPOS DO TORNEIO</h3>";

            selecionados.sort(() => Math.random() - 0.5);
            const numGrupos = Math.ceil(selecionados.length / 4);

            for (let i = 0; i < numGrupos; i++) {
                const grupo = selecionados.slice(i * 4, (i + 1) * 4);
                resDiv.innerHTML += `<div class="grupo-titulo">GRUPO ${String.fromCharCode(65 + i)}</div>`;
                grupo.forEach(atleta => {
                    resDiv.innerHTML += `<div class="item-resultado">${atleta.n}</div>`;
                });
            }
            resDiv.innerHTML += `<div class="aviso">Boa sorte a todos os competidores! 🏆</div>`;
        }

        function getSelecionados() {
            const checks = document.querySelectorAll('.atleta-check:checked');
            return Array.from(checks).map(c => atletas[c.getAttribute('data-index')]);
        }

        function reiniciar() {
            if (confirm("Isso apagará todas as presenças. Continuar?")) {
                document.querySelectorAll('.atleta-check').forEach(c => c.checked = false);
                document.getElementById('resultado').style.display = "none";
            }
        }
        render();
    </script>
</body>

</html>
