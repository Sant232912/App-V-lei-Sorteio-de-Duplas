<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelho Bichado Pro</title>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #000000;
            --card: #1A1A1A;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            padding: 15px;
            margin: 0;
        }

        .main-container {
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 20px;
            max-width: 450px;
            margin: 0 auto;
            background: #050505;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.4rem;
            margin-top: 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1rem;
        }

        .genero-escolha {
            display: flex;
            gap: 8px;
        }

        .btn-gen {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-gen:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .lista-jogadores {
            height: 300px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 15px;
            padding: 5px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .card-jogador {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #252525;
        }

        .info-player {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .acoes-player {
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            opacity: 0.6;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        .btn-acao {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-limpar {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            font-size: 0.9rem;
        }

        .resultado-box {
            margin-top: 15px;
            background: #111;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--primary);
        }

        .dupla {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #222;
            font-weight: 500;
        }

        .aviso {
            font-size: 0.85rem;
            color: var(--primary);
            text-align: center;
            padding: 10px;
            font-style: italic;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="main-container">
        <h1>🏐 JOELHO BICHADO PRO</h1>

        <div class="input-group">
            <input type="text" id="novoNome" placeholder="Nome do novo atleta...">
            <div class="genero-escolha">
                <button class="btn-gen" onclick="adicionarComGento('M')">MASC (H)</button>
                <button class="btn-gen" onclick="adicionarComGento('F')">FEM (M)</button>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <select id="modo"
                style="width:100%; padding:12px; border-radius:12px; background:#222; color:white; border:1px solid #444;">
                <option value="geral">Modo Geral (Todos x Todos)</option>
                <option value="misto">Modo Misto (H + M)</option>
            </select>
        </div>

        <div class="lista-jogadores" id="lista"></div>

        <div id="resultado" class="resultado-box" style="display:none"></div>

        <button class="btn-acao" onclick="sortear()">GERAR PRÓXIMA RODADA 🎲</button>
        <button class="btn-acao btn-limpar" onclick="reiniciar()">REINICIAR DAY USE 🔄</button>
    </div>

    <script>
        let atletas = [
            { n: "Celin Vôlei", s: "M" }, { n: "Geminiana", s: "F" }, { n: "Lorraine", s: "F" },
            { n: "Emerson", s: "M" }, { n: "Lúcio", s: "M" }, { n: "Wendel", s: "M" },
            { n: "Ricardo", s: "M" }, { n: "Patrícia", s: "F" }, { n: "Bruno", s: "M" },
            { n: "Cássia", s: "F" }, { n: "Diego", s: "M" }, { n: "Fernanda", s: "F" },
            { n: "Gustavo", s: "M" }, { n: "Helena", s: "F" }, { n: "Igor", s: "M" },
            { n: "Juliana", s: "F" }, { n: "Kevin", s: "M" }, { n: "Larissa", s: "F" },
            { n: "Murilo", s: "M" }, { n: "Natália", s: "F" }, { n: "Otávio", s: "M" },
            { n: "Paula", s: "F" }, { n: "Quirino", s: "M" }, { n: "Renata", s: "F" },
            { n: "Samuel", s: "M" }, { n: "Talita", s: "F" }, { n: "Uriel", s: "M" },
            { n: "Vitor", s: "M" }, { n: "Wagner", s: "M" }, { n: "Xande", s: "M" }
        ];

        function render() {
            const container = document.getElementById('lista');
            container.innerHTML = "";
            atletas.forEach((atleta, i) => {
                container.innerHTML += `
                    <div class="card-jogador">
                        <div class="info-player">
                            <input type="checkbox" class="atleta-check" value="${i}">
                            <span>${atleta.n} <small style="color:#555">(${atleta.s})</small></span>
                        </div>
                        <div class="acoes-player">
                            <button class="icon-btn" onclick="editarNome(${i})">✏️</button>
                            <button class="icon-btn" style="color:#ff4444" onclick="excluirAtleta(${i})">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        function adicionarComGento(sexo) {
            const campo = document.getElementById('novoNome');
            const nome = campo.value;
            if (!nome) return alert("Digite o nome primeiro!");
            atletas.unshift({ n: nome, s: sexo });
            campo.value = "";
            render();
        }

        function editarNome(i) {
            const novo = prompt("Editar nome:", atletas[i].n);
            if (novo) {
                atletas[i].n = novo;
                render();
            }
        }

        function excluirAtleta(i) {
            if (confirm(`Remover ${atletas[i].n} da lista?`)) {
                atletas.splice(i, 1);
                render();
            }
        }

        function sortear() {
            const selecionados = Array.from(document.querySelectorAll('.atleta-check:checked')).map(c => atletas[c.value]);
            const resDiv = document.getElementById('resultado');
            if (selecionados.length < 2) return alert("Selecione os atletas presentes!");

            resDiv.style.display = "block";
            resDiv.innerHTML = "<h3 style='text-align:center; margin:0; color:var(--primary)'>DUPLAS DEFINIDAS</h3>";

            selecionados.sort(() => Math.random() - 0.5);
            const modo = document.getElementById('modo').value;

            if (modo === "misto") {
                let h = selecionados.filter(a => a.s === 'M');
                let m = selecionados.filter(a => a.s === 'F');
                while (h.length > 0 && m.length > 0) {
                    resDiv.innerHTML += `<div class="dupla">✅ ${h.pop().n} + ${m.pop().n}</div>`;
                }
                if (h.length > 0 || m.length > 0) {
                    let sobra = [...h, ...m];
                    resDiv.innerHTML += `<div class="aviso">⚠️ Sobrou sem par misto: ${sobra.map(s => s.n).join(', ')}</div>`;
                }
            } else {
                for (let i = 0; i < selecionados.length; i += 2) {
                    if (selecionados[i + 1]) {
                        resDiv.innerHTML += `<div class="dupla">✅ ${selecionados[i].n} + ${selecionados[i + 1].n}</div>`;
                    } else {
                        resDiv.innerHTML += `<div class="aviso">⚠️ Ímpar: ${selecionados[i].n} espera.</div>`;
                    }
                }
            }
            window.scrollTo({ top: resDiv.offsetTop, behavior: 'smooth' });
        }

        function reiniciar() {
            if (confirm("Deseja limpar as presenças do dia?")) {
                document.querySelectorAll('.atleta-check').forEach(c => c.checked = false);
                document.getElementById('resultado').style.display = "none";
            }
        }
        render();
    </script>
</body>

</html>
